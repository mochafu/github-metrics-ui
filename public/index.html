<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dev Metrics</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- all scripts are same-origin files (strict CSP: no inline JS, no CDNs) -->
  <script src="/chart.umd.js" defer></script>
  <script src="/app.js" defer></script>
</head>
<body>

  <div id="sidebar-overlay" hidden></div>

  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo"></div>
      <div>
        <div class="brand-name">Dev Metrics</div>
        <div class="brand-sub">engineering dashboard</div>
      </div>
    </div>
    <nav id="nav">
      <div class="nav-label">Menu</div>
      <a class="nav-item" href="#/" data-nav="overview">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>Overview
      </a>
      <a class="nav-item" href="#/team" data-nav="team">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-1.13a4 4 0 10-4-4 4 4 0 004 4zm6-4a3 3 0 11-3-3"/>
        </svg>Team
      </a>
      <div class="nav-label">Repositories</div>
      <div id="nav-repos"><div class="nav-empty">Loading…</div></div>
    </nav>
    <div class="sidebar-foot" id="sidebar-foot">GitHub Metrics Collector</div>
  </aside>

  <div class="shell">
    <header class="topbar">
      <button id="menu-btn" aria-label="Open menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div id="breadcrumb" class="breadcrumb"></div>
      <div class="topbar-right">
        <button id="ai-report-btn" class="ai-btn" title="Generate an AI report for the selected range">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8zM19 15l.9 2.6L22.5 18.5l-2.6.9L19 22l-.9-2.6-2.6-.9 2.6-.9z"/>
          </svg>AI Report
        </button>
        <button id="ai-ask-btn" class="ai-btn" title="Ask questions about the metrics">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M21 12a8 8 0 01-8 8H5l-2 2V12a8 8 0 018-8h2a8 8 0 018 8z"/>
          </svg>Ask AI
        </button>
        <label class="range-select">
          <span class="range-select-label">Range</span>
          <select id="range-select" aria-label="Time range">
            <option value="1d">1 day</option>
            <option value="1w">1 week</option>
            <option value="6w">6 weeks</option>
            <option value="12m">12 months</option>
            <option value="all">All time</option>
          </select>
        </label>
      </div>
    </header>
    <main><div id="view"></div></main>
  </div>

  <div id="modal-root" hidden></div>

  <!-- Ask AI drawer: lives outside #modal-root so an open conversation
       survives route changes (route() clears modals on every navigation). -->
  <aside id="ask-drawer" hidden aria-label="Ask AI about the metrics">
    <div class="ask-head">
      <div>
        <div class="ask-title">Ask AI</div>
        <div class="ask-sub">answers computed live from the metrics DB</div>
      </div>
      <button id="ask-clear" class="ask-clear" title="Clear conversation">Clear</button>
      <button id="ask-close" class="modal-x" aria-label="Close">×</button>
    </div>
    <div id="ask-msgs"></div>
    <form id="ask-form">
      <textarea id="ask-input" rows="2" placeholder="e.g. Which repos are trending down this quarter?" aria-label="Question"></textarea>
      <button type="submit" id="ask-send" class="ask-send" aria-label="Send">Send</button>
    </form>
  </aside>

</body>
</html>
