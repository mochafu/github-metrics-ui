<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dev Metrics</title>
  <script src="/chart.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0a0e17', card: '#111827', border: '#1d2a3f' },
            accent:  { DEFAULT: '#6366f1', muted: '#818cf8' },
            success: { DEFAULT: '#10b981', muted: '#34d399' },
            warn:    '#f59e0b',
            danger:  '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    canvas { display: block; }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 8px; font-size: 13px;
      color: #64748b; cursor: pointer; width: 100%; text-align: left;
      background: transparent; border: none;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nav-item:hover { background: #1d2a3f; color: #e2e8f0; }
    .nav-item.active { background: rgba(99,102,241,0.15); color: #a5b4fc; font-weight: 600; }
    .contrib-avatar {
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .contrib-avatar:hover {
      box-shadow: 0 0 0 2px #6366f1;
      border-color: #818cf8;
    }
  </style>
</head>
<body class="bg-surface text-slate-200 antialiased">

  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-20 hidden lg:hidden"></div>

  <aside id="sidebar" class="fixed top-0 left-0 h-screen w-64 bg-[#07090f] border-r border-surface-border z-30 flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out">
    <div class="px-5 py-4 border-b border-surface-border shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-emerald-400 shrink-0 shadow-lg shadow-indigo-500/20"></div>
        <div>
          <div class="text-sm font-semibold text-slate-100 leading-tight tracking-tight">Dev Metrics</div>
          <div class="text-[11px] text-slate-500 leading-tight mt-0.5">engineering dashboard</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto p-3">
      <div class="px-3 pt-3 pb-1.5 text-[10px] font-bold uppercase tracking-widest text-slate-600">Menu</div>
      <button id="nav-overview" class="nav-item active">
        <svg class="w-4 h-4 shrink-0 opacity-70" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Overview
      </button>
      <div class="px-3 pt-4 pb-1.5 text-[10px] font-bold uppercase tracking-widest text-slate-600">Repositories</div>
      <div id="nav-repos"><div class="px-3 py-2 text-xs text-slate-600 italic">Loading…</div></div>
    </nav>
    <div class="px-5 py-3 border-t border-surface-border shrink-0">
      <div class="text-[11px] text-slate-600">GitHub Metrics Collector</div>
    </div>
  </aside>

  <div class="lg:ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-10 border-b border-surface-border bg-surface/80 backdrop-blur-sm flex items-center gap-3 px-5 py-3">
      <button id="menu-btn" class="lg:hidden p-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-surface-card transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div id="breadcrumb" class="flex items-center gap-2 text-sm min-w-0 overflow-hidden">
        <span class="text-slate-200 font-medium">Overview</span>
      </div>
    </header>
    <main class="flex-1 p-6">
      <div id="view" class="text-slate-500 text-center py-20 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    // ---------- Sidebar toggle ----------
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('menu-btn');
    function openSidebar()  { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
    function closeSidebar() { sidebar.classList.add('-translate-x-full');    overlay.classList.add('hidden'); }
    menuBtn.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // ---------- Nav helpers ----------
    function setActiveNav(id) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }
    function updateBreadcrumb(html) { document.getElementById('breadcrumb').innerHTML = html; }
    function populateSidebarRepos(repos) {
      const el = document.getElementById('nav-repos');
      if (!repos || !repos.length) {
        el.innerHTML = '<div class="px-3 py-2 text-xs text-slate-600 italic">no repos yet</div>';
        return;
      }
      el.innerHTML = repos.map(r => {
        const name = esc(r.full_name.split('/')[1] || r.full_name);
        return `<button id="nav-repo-${r.id}" class="nav-item" data-repoid="${r.id}">
          <svg class="w-3.5 h-3.5 shrink-0 opacity-40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          </svg>${name}</button>`;
      }).join('');
      el.querySelectorAll('button[data-repoid]').forEach(btn =>
        btn.addEventListener('click', () => { loadRepo(btn.dataset.repoid).catch(showError); closeSidebar(); }));
    }

    // ---------- Formatting helpers ----------
    const fmtH    = (h) => h == null ? "—" : h < 1 ? Math.round(h * 60) + "m" : h < 48 ? h.toFixed(1) + "h" : (h / 24).toFixed(1) + "d";
    const pct     = (x) => x == null ? "—" : Math.round(x * 100) + "%";
    const num     = (n) => (n ?? 0).toLocaleString();
    const freq    = (f) => (f ? f.toFixed(1) : "0") + "/wk";
    const esc     = (s) => (s ?? "").toString().replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const relTime = (d) => {
      if (!d) return '—';
      const days = Math.floor((Date.now() - new Date(d)) / 86400000);
      if (days < 1) return 'today'; if (days < 2) return 'yesterday';
      if (days < 30) return days + 'd ago';
      if (days < 365) return Math.floor(days / 30) + 'mo ago';
      return (days / 365).toFixed(1) + 'yr ago';
    };

    const view = document.getElementById("view");
    let charts = [];
    const clearCharts = () => { charts.forEach((c) => c.destroy()); charts = []; };

    async function fetchJSON(url) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 20000);
      let res;
      try { res = await fetch(url, { signal: ctrl.signal }); }
      catch (e) { throw new Error(ctrl.signal.aborted ? "request timed out" : e.message); }
      finally { clearTimeout(timer); }
      let body = null;
      try { body = await res.json(); } catch { /* leave null */ }
      if (!res.ok) throw new Error((body && body.error) || ("HTTP " + res.status));
      if (body == null) throw new Error("invalid response from server");
      return body;
    }

    const showError = (e) => {
      clearCharts();
      view.className = "text-center py-20 text-sm text-danger";
      view.textContent = "Failed to load: " + (e && e.message ? e.message : e);
    };

    // ---------- Component helpers ----------
    const kpi = (label, value, sub = "") => `
      <div class="bg-surface-card border border-surface-border rounded-xl p-5 flex flex-col gap-1">
        <div class="text-[11px] font-semibold uppercase tracking-widest text-slate-500">${label}</div>
        <div class="text-3xl font-bold text-slate-100 tabular-nums leading-none mt-2">${value}</div>
        <div class="text-xs text-slate-500 mt-0.5">${sub || "&nbsp;"}</div>
      </div>`;

    const methodChip = (m) =>
      m === "none"
        ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-slate-800 text-slate-400 border border-slate-700">no deploy signal</span>`
        : m === "GitHub Deployments"
        ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-950 text-emerald-400 border border-emerald-800">${esc(m)}</span>`
        : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-amber-950 text-amber-400 border border-amber-800">${esc(m)}</span>`;

    // repoId / repoName optional — when provided the avatar navigates into that repo's contributor page
    function contributorList(list, repoId, repoName) {
      if (!list || !list.length) return `<div class="text-center text-slate-500 py-6 text-sm">no contributor data</div>`;
      const max = Math.max(...list.map((c) => c.commits), 1);
      return `<div class="space-y-3">${list.map((c) => {
        const initials = (c.login || "?").slice(0, 2).toUpperCase();
        const w = Math.round((c.commits / max) * 100);
        return `<div class="flex items-center gap-3">
          <div class="contrib-avatar w-7 h-7 rounded-full bg-indigo-900 border border-indigo-700 text-indigo-300 text-[10px] font-bold flex items-center justify-center shrink-0 select-none cursor-pointer"
               data-login="${esc(c.login)}"
               data-repoid="${repoId || ''}"
               data-reponame="${esc(repoName || '')}">${initials}</div>
          <div class="w-28 text-sm font-medium text-slate-300 truncate shrink-0">${esc(c.login)}</div>
          <div class="flex-1 rounded-full overflow-hidden" style="height:6px;background:#1e293b">
            <div class="h-full rounded-full" style="width:${w}%;background:linear-gradient(to right,#6366f1,#10b981)"></div>
          </div>
          <div class="text-xs text-slate-500 text-right shrink-0 w-32">${num(c.commits)} commits · ${num(c.prs)} PRs</div>
        </div>`;
      }).join('')}</div>`;
    }

    function attachAvatarHandlers(container) {
      container.querySelectorAll('.contrib-avatar[data-login]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const { login, repoid, reponame } = el.dataset;
          loadContributor(login, repoid || null, reponame || null).catch(showError);
        });
      });
    }

    // ---------- Chart helpers ----------
    function lineChart(canvas, labels, datasets) {
      charts.push(new Chart(canvas, {
        type: "line", data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: "#64748b", boxWidth: 10, font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: "#64748b", maxTicksLimit: 8, font: { size: 11 } }, grid: { color: "#1d2a3f" } },
            y: { beginAtZero: true, ticks: { color: "#64748b", precision: 0, font: { size: 11 } }, grid: { color: "#1d2a3f" } },
          },
        },
      }));
    }
    function barChart(canvas, labels, data, color) {
      charts.push(new Chart(canvas, {
        type: "bar",
        data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#64748b", maxTicksLimit: 8, font: { size: 11 } }, grid: { color: "#1d2a3f" } },
            y: { beginAtZero: true, ticks: { color: "#64748b", precision: 0, font: { size: 11 } }, grid: { color: "#1d2a3f" } },
          },
        },
      }));
    }
    function doughnutChart(canvas, labels, data, colors) {
      charts.push(new Chart(canvas, {
        type: "doughnut",
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { color: "#94a3b8", boxWidth: 10, font: { size: 11 }, padding: 8 } } },
          cutout: '68%',
        },
      }));
    }

    // Commit scatter timeline — X=time, Y=impact tier by change_type.
    // Commits without analysis land at tier 0 ("unanalysed").
    const TIER = { new_feature: 5, bug_fix: 4, refactor: 3, test: 2, docs: 1, config: 1, chore: 1 };
    const TIER_LABEL = { 0: 'unanalysed', 1: 'chore / docs', 2: 'test', 3: 'refactor', 4: 'bug fix', 5: 'feature' };
    const TIER_COLOR = {
      new_feature: 'rgba(99,102,241,0.75)',  bug_fix:  'rgba(239,68,68,0.75)',
      refactor:    'rgba(16,185,129,0.75)',   test:     'rgba(245,158,11,0.75)',
      docs:        'rgba(100,116,139,0.70)',  config:   'rgba(100,116,139,0.70)',
      chore:       'rgba(71,85,105,0.70)',    unknown:  'rgba(51,65,85,0.60)',
    };

    function commitTimelineChart(canvas, commits) {
      // Group commits into per-type datasets so each type gets its own legend colour.
      const groups = {};
      for (const c of commits) {
        const type = c.change_type || 'unknown';
        if (!groups[type]) groups[type] = [];
        const baseY = TIER[c.change_type] ?? 0;
        // Deterministic jitter ±0.28 from last 3 hex chars of sha to spread same-tier dots.
        const jitter = ((parseInt((c.sha || '000').slice(-3), 16) % 57) - 28) / 100;
        groups[type].push({
          x: new Date(c.authored_at).getTime(),
          y: baseY + jitter,
          author: c.author_login,
          summary: c.summary,
          change_type: c.change_type,
          domain: c.domain,
          authored_at: c.authored_at,
        });
      }

      const typeOrder = ['new_feature', 'bug_fix', 'refactor', 'test', 'docs', 'config', 'chore', 'unknown'];
      const datasets = typeOrder
        .filter(t => groups[t])
        .map(type => ({
          label: CT_LABELS[type]?.label || 'unanalysed',
          data: groups[type],
          backgroundColor: TIER_COLOR[type],
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBorderWidth: 0,
        }));

      charts.push(new Chart(canvas, {
        type: 'scatter',
        data: { datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#64748b', boxWidth: 8, font: { size: 11 }, padding: 12 } },
            tooltip: {
              mode: 'nearest', intersect: true,
              callbacks: {
                title: (items) => {
                  const r = items[0]?.raw;
                  return r ? '@' + r.author + '  ·  ' + fmtDate(r.authored_at) : '';
                },
                label: (item) => {
                  const r = item.raw;
                  const lines = [];
                  if (r.summary) lines.push(r.summary);
                  const tier = CT_LABELS[r.change_type]?.label;
                  if (tier) lines.push('Type: ' + tier);
                  if (r.domain) lines.push('Area: ' + r.domain);
                  return lines.length ? lines : ['(no analysis)'];
                },
              },
            },
          },
          scales: {
            x: {
              type: 'linear',
              ticks: {
                color: '#64748b', maxTicksLimit: 8, font: { size: 11 },
                callback: (v) => new Date(v).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' }),
              },
              grid: { color: '#1d2a3f' },
            },
            y: {
              min: -0.5, max: 5.8,
              ticks: {
                color: '#64748b', font: { size: 10 }, stepSize: 1,
                callback: (v) => TIER_LABEL[Math.round(v)] || '',
              },
              grid: { color: '#1d2a3f' },
            },
          },
        },
      }));
    }

    // ---------- Contributor weekly activity — stacked bar by commit type ----------
    // Buckets every commit into the ISO week it landed in, stacks bars by type so
    // you can see both total volume and work-mix shifting over time.
    const ACT_SOLID = {
      new_feature: 'rgba(99,102,241,0.85)',
      bug_fix:     'rgba(239,68,68,0.85)',
      refactor:    'rgba(16,185,129,0.85)',
      test:        'rgba(245,158,11,0.85)',
      docs:        'rgba(100,116,139,0.75)',
      config:      'rgba(71,85,105,0.75)',
      chore:       'rgba(51,65,85,0.75)',
      unknown:     'rgba(71,85,105,0.55)',
    };

    function contributorActivityChart(canvas, commits) {
      if (!commits.length) {
        canvas.parentElement.innerHTML =
          '<div class="flex items-center justify-center h-full text-sm text-slate-500">no commit history</div>';
        return;
      }

      // Bucket commits into ISO weeks (Monday-anchored)
      const weekMap = {};
      for (const c of commits) {
        const d = new Date(c.authored_at);
        const wk = new Date(d);
        wk.setUTCHours(0, 0, 0, 0);
        wk.setUTCDate(d.getUTCDate() - ((d.getUTCDay() + 6) % 7));
        const key = wk.toISOString().slice(0, 10);
        if (!weekMap[key]) weekMap[key] = {};
        const type = c.change_type || 'unknown';
        weekMap[key][type] = (weekMap[key][type] || 0) + 1;
      }

      const weeks = Object.keys(weekMap).sort();
      const labels = weeks.map(w => {
        const d = new Date(w + 'T00:00:00Z');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      });

      const typeOrder = ['new_feature','bug_fix','refactor','test','docs','config','chore','unknown'];
      const presentTypes = typeOrder.filter(t => weeks.some(w => weekMap[w][t]));

      const datasets = presentTypes.map(type => ({
        label: CT_LABELS[type]?.label || 'unanalysed',
        data: weeks.map(w => weekMap[w][type] || 0),
        backgroundColor: ACT_SOLID[type],
        borderWidth: 0,
        borderRadius: 2,
        stack: 'commits',
      }));

      charts.push(new Chart(canvas, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { labels: { color: '#64748b', boxWidth: 8, font: { size: 11 }, padding: 12 } },
            tooltip: {
              mode: 'index', intersect: false,
              callbacks: {
                title: items => 'Week of ' + labels[items[0].dataIndex],
                label: item => item.raw > 0 ? ' ' + item.dataset.label + ': ' + item.raw : null,
                footer: items => {
                  const total = items.reduce((s, i) => s + i.raw, 0);
                  return 'Total: ' + total + ' commits';
                },
              },
            },
          },
          scales: {
            x: {
              stacked: true,
              ticks: {
                color: '#64748b', font: { size: 11 },
                maxTicksLimit: Math.min(weeks.length, 16),
                maxRotation: 45,
              },
              grid: { color: '#1d2a3f' },
            },
            y: {
              stacked: true,
              beginAtZero: true,
              title: { display: true, text: 'commits', color: '#475569', font: { size: 10 } },
              ticks: { color: '#64748b', font: { size: 11 }, precision: 0 },
              grid: { color: '#1d2a3f' },
            },
          },
        },
      }));
    }

    // ---------- Commit-type helpers ----------
    const CT_LABELS = {
      new_feature: { cls: "bg-indigo-950 text-indigo-400 border-indigo-800",   label: "feature"  },
      bug_fix:     { cls: "bg-red-950 text-red-400 border-red-800",             label: "bug fix"  },
      refactor:    { cls: "bg-emerald-950 text-emerald-400 border-emerald-800", label: "refactor" },
      test:        { cls: "bg-amber-950 text-amber-400 border-amber-800",       label: "test"     },
      docs:        { cls: "bg-slate-800 text-slate-400 border-slate-700",       label: "docs"     },
      config:      { cls: "bg-slate-800 text-slate-400 border-slate-700",       label: "config"   },
      chore:       { cls: "bg-slate-800 text-slate-400 border-slate-700",       label: "chore"    },
    };
    const CT_COLORS = {
      new_feature: '#6366f1', bug_fix: '#ef4444', refactor: '#10b981',
      test: '#f59e0b', docs: '#64748b', config: '#475569', chore: '#334155',
    };

    function ctChipHtml(type) {
      if (!type) return '';
      const { cls, label } = CT_LABELS[type] || { cls: 'bg-slate-800 text-slate-400 border-slate-700', label: type };
      return `<span class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-semibold border ${cls}">${label}</span>`;
    }
    function topChangeType(c) {
      return [
        ['new_feature', c.new_features||0], ['bug_fix', c.bug_fixes||0],
        ['refactor', c.refactors||0], ['test', c.tests||0],
        ['docs', c.docs||0], ['config', c.configs||0], ['chore', c.chores||0],
      ].filter(([,n]) => n > 0).sort(([,a],[,b]) => b-a)[0]?.[0] || null;
    }

    // ---------- Weekly digest ----------
    function weeklyDigestHtml(weeks) {
      if (!weeks || !weeks.length)
        return `<div class="text-center text-slate-500 py-6 text-sm">no commits in the last 12 weeks</div>`;
      return `<div class="divide-y divide-surface-border">${weeks.map((w) => {
        const badges = [
          {key:"new_feature",n:w.new_features},{key:"bug_fix",n:w.bug_fixes},
          {key:"refactor",n:w.refactors},{key:"test",n:w.tests},
          {key:"docs",n:w.docs},{key:"config",n:w.configs},{key:"chore",n:w.chores},
        ].filter(b=>b.n>0).map(b=>{
          const {cls,label}=CT_LABELS[b.key]||{cls:"bg-slate-800 text-slate-400 border-slate-700",label:b.key};
          return `<span class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-semibold border ${cls}">${b.n}&nbsp;${label}</span>`;
        }).join(' ');
        const summaries=(w.analyses||[]).filter(a=>a.summary).slice(0,5);
        const summaryList=summaries.length
          ?`<ul class="mt-2 space-y-1 pl-1">${summaries.map(a=>`<li class="flex items-start gap-1.5 text-xs text-slate-500"><span class="text-indigo-500 shrink-0 mt-px">·</span><span>${esc(a.summary)} <span class="text-emerald-500/80">${esc(a.author||"")}</span></span></li>`).join('')}</ul>`
          :"";
        return `<div class="py-3 first:pt-0 last:pb-0">
          <div class="flex flex-wrap items-center gap-3">
            <span class="text-sm font-semibold text-slate-200 min-w-[90px]">${esc(w.week)}</span>

                    <td class="px-4 py-3 text-right tabular-nums text-slate-400">${s.totalCommits?Math.round((r.commits/s.totalCommits)*100)+'%':'—'}</td>
                    <td class="px-4 py-3 text-right tabular-nums text-slate-400">${num(r.prs)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>

        ${d.recentActivity.length?`
        <div class="mt-6 pb-10">
          <div class="text-[11px] font-bold uppercase tracking-widest text-slate-600 mb-3">Recent commits</div>
          <div class="bg-surface-card border border-surface-border rounded-xl divide-y divide-surface-border">
            ${d.recentActivity.map(a=>`
              <div class="px-5 py-3 flex items-start gap-3">
                <div class="shrink-0 mt-0.5">${ctChipHtml(a.change_type)}</div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm text-slate-300 leading-snug">${esc(a.summary)}</div>
                  <div class="text-xs text-slate-500 mt-1 flex flex-wrap items-center gap-x-2 gap-y-0.5">
                    <span class="text-slate-400">${esc(a.repo)}</span>
                    <span class="text-slate-700">·</span><span>${fmtDate(a.authored_at)}</span>
                    ${a.domain?`<span class="text-slate-700">·</span><span class="text-indigo-400/70">${esc(a.domain)}</span>`:''}
                  </div>
                </div>
              </div>`).join('')}
          </div>
        </div>`:''}`;

      view.querySelectorAll('tr[data-gorepo]').forEach(tr=>
        tr.addEventListener('click',()=>loadRepo(tr.dataset.gorepo).catch(showError)));

      if (activityCommits.length) {
        contributorActivityChart(document.getElementById('c-activity'), activityCommits);
      } else {
        document.getElementById('c-activity-wrap').innerHTML =
          '<div class="flex items-center justify-center h-full text-sm text-slate-500">no commit data</div>';
      }

      if (d.typeBreakdown.length) {
        doughnutChart(
          document.getElementById('c-types'),
          d.typeBreakdown.map(t=>CT_LABELS[t.change_type]?.label||t.change_type),
          d.typeBreakdown.map(t=>t.count),
          d.typeBreakdown.map(t=>CT_COLORS[t.change_type]||'#64748b')
        );
      }
    }

    document.getElementById('nav-overview').addEventListener('click',()=>loadHome().catch(showError));
    loadHome().catch(showError);
  </script>
</body>
</html>
